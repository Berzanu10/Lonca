<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lonca</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

  <!-- Giriş Ekranı -->
  <div id="login-screen">
    <h2>Lonca'ya Hoş Geldin</h2>
    <input type="text" id="username-input" placeholder="Takma adınızı girin..." autocomplete="off">
    <button id="join-btn">Sunucuya Katıl</button>
  </div>

  <!-- Ana Uygulama Arayüzü -->
  <div id="app-container" style="display: none;">
    
    <!-- Sol Tarafta Kanallar -->
    <div class="sidebar">
      <div class="channel-section">
        <h3>Kanallar</h3>
        <ul id="channels-list">
          <li class="channel active" data-room="genel"># genel</li>
          <li class="channel" data-room="oyun"># oyun</li>
          <li class="channel" data-room="muzik"># müzik</li>
        </ul>
      </div>
    </div>
    
    <!-- Ortada Metin Sohbeti Alanı -->
    <div class="main-content">
      <div class="room-header">
        <h2 id="current-room-name"># genel</h2>
      </div>
      <div class="chat-section">
        <div id="messages"></div>
        <form id="chat-form">
           <input type="text" id="chat-input" placeholder="Bu odaya mesaj yaz..." autocomplete="off">
           <button type="submit">Gönder</button>
        </form>
      </div>
    </div>

    <!-- Sağ Tarafta Aktif Kullanıcı Listesi (Kamera alanı kaldırıldı) -->
    <div class="right-sidebar">
      <div class="users-section">
         <h3>Bu Odadakiler</h3>
         <ul id="users-list"></ul>
      </div>
    </div>

  </div>

  <!-- Görüntülü Görüşme Penceresi (SADECE BİRİNİ ARADIĞINIZDA AÇILIR) -->
  <div id="video-modal" style="display: none;">
     <div class="video-modal-content">
        <h3>📹 Aktif Görüntülü Görüşme</h3>
        <div id="video-grid">
           <!-- Katılımcı Videoları Dinamik Olarak Buraya Düşecek -->
        </div>
        <div class="video-controls">
           <button id="hangup-btn" class="danger">Aramayı Sonlandır</button>
        </div>
     </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
