<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lonca - Discord Web</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="login-screen">
    <h2>Lonca'ya Hoş Geldin</h2>
    <input type="text" id="username-input" placeholder="Takma adınızı girin..." autocomplete="off">
    <button id="join-btn">Sunucuya Katıl</button>
  </div>

  <div id="app-container" style="display: none;">
    
    <!-- SOL BÖLÜM -->
    <div class="sidebar">
      
      <div class="sidebar-scrollable">
          <div class="channel-section">
            <h3>Metin Kanalları</h3>
            <ul id="text-channels-list">
              <li class="channel text-channel active" data-room="genel">
                <svg width="20" height="24" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 6px;"><path d="M16 4h-2l-1 5h-5l1-5h-2l-1 5h-4v2h3.5l-1 5h-3.5v2h3.5l-1 5h2l1-5h5l-1 5h2l1-5h4v-2h-3.5l1-5h3.5v-2h-3.5l1-5zm-3 12h-5l1-5h5l-1 5z"/></svg> genel
              </li>
              <li class="channel text-channel" data-room="oyun">
                <svg width="20" height="24" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 6px;"><path d="M16 4h-2l-1 5h-5l1-5h-2l-1 5h-4v2h3.5l-1 5h-3.5v2h3.5l-1 5h2l1-5h5l-1 5h2l1-5h4v-2h-3.5l1-5h3.5v-2h-3.5l1-5zm-3 12h-5l1-5h5l-1 5z"/></svg> oyun
              </li>
              <li class="channel text-channel" data-room="muzik">
                <svg width="20" height="24" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 6px;"><path d="M16 4h-2l-1 5h-5l1-5h-2l-1 5h-4v2h3.5l-1 5h-3.5v2h3.5l-1 5h2l1-5h5l-1 5h2l1-5h4v-2h-3.5l1-5h3.5v-2h-3.5l1-5zm-3 12h-5l1-5h5l-1 5z"/></svg> müzik
              </li>
            </ul>
          </div>

          <div class="channel-section" style="margin-top: 1.5rem;">
            <h3>Sesli Sohbetler</h3>
            <ul id="voice-channels-list">
              <li class="channel voice-channel" data-room="sohbet">
                 <div class="voice-channel-header">
                     <svg width="20" height="24" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 6px; flex-shrink: 0;"><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
                     Sohbet Odası
                 </div>
                 <ul class="voice-users" id="voice-users-sohbet"></ul>
              </li>
              <li class="channel voice-channel" data-room="oyun">
                 <div class="voice-channel-header">
                     <svg width="20" height="24" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 6px; flex-shrink: 0;"><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
                     Oyun Ekibi
                 </div>
                 <ul class="voice-users" id="voice-users-oyun"></ul>
              </li>
              <li class="channel voice-channel" data-room="sessiz">
                 <div class="voice-channel-header">
                     <svg width="20" height="24" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 6px; flex-shrink: 0;"><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
                     Sessiz Çalışma
                 </div>
                 <ul class="voice-users" id="voice-users-sessiz"></ul>
              </li>
            </ul>
          </div>
      </div>

      <!-- ALT KONTROL PANELİ -->
      <div class="user-bottom-panel" id="user-bottom-panel">
          
          <div id="voice-connection-info" style="display: none;">
              <div class="connection-left">
                  <svg class="signal-icon" width="20" height="20" viewBox="0 0 24 24" fill="#43b581"><path d="M12 21h2v-6h-2v6zm-4 0h2v-11H8v11zm8 0h2v-14h-2v14zm4-19v21h2V2h-2zM4 21h2v-4H4v4z"/></svg>
                  <div class="voice-text">
                      <div class="status-title">Voice Connected</div>
                      <div class="status-room" id="active-voice-room-name">Sohbet Odası</div>
                  </div>
              </div>
              <button id="bottom-leave-voice" class="icon-btn hover-danger" title="Bağlantıyı Kes">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>
              </button>
          </div>

          <div class="user-controls-bar">
              <div class="current-user-info">
                 <div id="my-avatar" class="voice-avatar" style="width:34px; height:34px; border-width:2px; background-size:20px; margin-right:8px;"></div>
                 <div class="user-name-tag">
                     <div id="display-my-username">Sen</div>
                     <div class="user-tag">#1000</div>
                 </div>
              </div>
              <div class="control-icons">
                 <button id="toggle-mic-btn" class="icon-btn" title="Mikrofon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                 </button>
                 <button id="toggle-deaf-btn" class="icon-btn" title="Kulaklık">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9v7c0 1.1.9 2 2 2h4v-8H5v-1c0-3.87 3.13-7 7-7s7 3.13 7 7v1h-4v8h4c1.1 0 2-.9 2-2v-7c0-4.97-4.03-9-9-9z"/></svg>
                 </button>
                 <button id="settings-btn" class="icon-btn" title="Ayarlar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
                 </button>
              </div>
          </div>
      </div>

    </div>
    
    <!-- ORTA BÖLÜM -->
    <div class="main-content">
      <div class="room-header">
        <h2 id="current-room-name"># genel</h2>
      </div>
      <div class="chat-section">
        <div id="messages"></div>
        <form id="chat-form">
           <input type="text" id="chat-input" placeholder="Metin yaz..." autocomplete="off">
           <button type="submit">Gönder</button>
        </form>
      </div>
    </div>

    <!-- SAĞ BÖLÜM -->
    <div class="right-sidebar">
      <div class="users-section">
         <h3>KULLANICILAR</h3>
         <ul id="users-list"></ul>
      </div>
    </div>

  </div>

  <div id="video-modal" style="display: none;">
     <div class="video-modal-content">
        <h3>📹 Özel Çift Taraflı Görüntülü Arama</h3>
        <div id="video-grid"></div>
        <div class="video-controls">
           <button id="hangup-btn" class="danger-btn">Aramayı Sonlandır</button>
        </div>
     </div>
  </div>

  <div id="audio-container" style="display:none;"></div>
  <script src="script.js"></script>
</body>
</html>
